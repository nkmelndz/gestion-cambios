<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sistema de Gestión de Cambios</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top right, var(--bg-surface), var(--bg-base));
      padding: 20px;
    }
    .login-card {
      max-width: 400px;
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 100px;
      height: 100px;
      background: var(--accent);
      filter: blur(80px);
      opacity: 0.3;
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 16px;
      box-shadow: var(--shadow-accent);
    }
    .login-header h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
    }
    .login-header p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 4px;
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">⚙️</div>
      <h1>GestioCambios</h1>
      <p>Ingresa para gestionar el ciclo de vida de los cambios</p>
    </div>
    <form onsubmit="event.preventDefault(); window.location.href='ui-02-dashboard.html';">
      <div class="form-group">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" class="form-control" placeholder="nombre@empresa.com" required>
      </div>
      <div class="form-group">
        <div class="flex justify-between items-center mb-2">
          <label class="form-label" style="margin-bottom:0">Contraseña</label>
          <a href="#" class="text-xs">¿Olvidaste tu contraseña?</a>
        </div>
        <input type="password" class="form-control" placeholder="••••••••" required>
      </div>
      <div class="form-group flex items-center gap-2 mt-4">
        <input type="checkbox" id="remember" style="accent-color: var(--accent)">
        <label for="remember" class="text-sm text-secondary">Recordar sesión</label>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">
        Iniciar Sesión
      </button>
    </form>
    <div class="login-footer">
      <p>© 2026 Sistema de Gestión de Cambios G04</p>
    </div>
  </div>
</body>
</html>
